<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="LPP Search">
<meta name="theme-color" content="#0d1f13">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<title>Address Search — LPP</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;600;700&family=DM+Mono&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--green:#1a4d2e;--green-mid:#2d7a47;--lime:#7ec850;--cream:#f5f0e8;--amber:#e8a020;--red:#c0392b;--dark:#0d1f13;--border:rgba(126,200,80,0.25)}
html,body{height:100%;font-family:'DM Sans',sans-serif;background:var(--dark);color:var(--cream);overflow-x:hidden}
.bg{position:fixed;inset:0;z-index:0;background:radial-gradient(ellipse 80% 60% at 20% 10%,rgba(45,122,71,0.35) 0%,transparent 60%),radial-gradient(ellipse 60% 80% at 85% 90%,rgba(26,77,46,0.4) 0%,transparent 55%),radial-gradient(ellipse 100% 100% at 50% 50%,#0d1f13 0%,#060e09 100%)}
.container{position:relative;z-index:10;max-width:480px;margin:0 auto;padding:20px 16px 40px;min-height:100vh}
.back{display:inline-flex;align-items:center;gap:6px;color:var(--lime);text-decoration:none;font-size:13px;font-weight:500;margin-bottom:16px;opacity:0.7;padding:8px 12px;background:rgba(126,200,80,0.05);border:1px solid rgba(126,200,80,0.15);border-radius:10px}
.back:active{background:rgba(126,200,80,0.1)}
.header{margin-bottom:20px}
.title{font-family:'Bebas Neue',sans-serif;font-size:32px;letter-spacing:1px;margin-bottom:4px;line-height:1}
.subtitle{font-size:13px;color:rgba(245,240,232,0.5)}
.card{background:rgba(255,255,255,0.04);border:1px solid var(--border);border-radius:16px;padding:20px;margin-bottom:16px;backdrop-filter:blur(20px)}
label{display:block;font-size:11px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;color:var(--lime);margin-bottom:8px;opacity:0.9}
input[type="text"]{width:100%;padding:14px 16px;background:rgba(0,0,0,0.35);border:1px solid rgba(126,200,80,0.2);border-radius:12px;color:var(--cream);font-size:16px;font-family:'DM Sans',sans-serif;outline:none;transition:border 0.2s,box-shadow 0.2s;-webkit-appearance:none}
input:focus{border-color:var(--lime);box-shadow:0 0 0 3px rgba(126,200,80,0.12)}
input::placeholder{color:rgba(245,240,232,0.25)}
.btn{width:100%;padding:15px;background:linear-gradient(135deg,var(--lime),var(--green-mid));color:var(--dark);font-size:15px;font-weight:700;letter-spacing:0.5px;border:none;border-radius:13px;cursor:pointer;margin-top:14px;transition:transform 0.15s,opacity 0.15s;box-shadow:0 6px 20px rgba(126,200,80,0.35);font-family:'DM Sans',sans-serif;-webkit-appearance:none}
.btn:active{transform:scale(0.97)}
.btn:disabled{opacity:0.4;cursor:not-allowed}
.btn-spinner{display:inline-block;width:14px;height:14px;border:2px solid rgba(13,31,19,0.3);border-top-color:var(--dark);border-radius:50%;animation:spin 0.7s linear infinite;vertical-align:middle;margin-right:8px}
@keyframes spin{to{transform:rotate(360deg)}}

/* Loading state */
#loadingRegistry{text-align:center;padding:40px 20px;color:rgba(245,240,232,0.5)}
.load-spinner{display:inline-block;width:28px;height:28px;border:3px solid rgba(126,200,80,0.2);border-top-color:var(--lime);border-radius:50%;animation:spin 0.8s linear infinite;margin-bottom:14px}

/* Results */
.result-banner{padding:18px 20px;border-radius:14px;margin-bottom:14px;display:flex;align-items:center;gap:14px;animation:slideIn 0.4s ease both}
@keyframes slideIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.result-banner.clear{background:rgba(126,200,80,0.1);border:1px solid rgba(126,200,80,0.3)}
.result-banner.warning{background:rgba(232,160,32,0.12);border:1px solid rgba(232,160,32,0.35)}
.result-banner.danger{background:rgba(192,57,43,0.12);border:1px solid rgba(192,57,43,0.4)}
.result-icon{width:44px;height:44px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0}
.result-banner.clear .result-icon{background:rgba(126,200,80,0.2)}
.result-banner.warning .result-icon{background:rgba(232,160,32,0.2)}
.result-banner.danger .result-icon{background:rgba(192,57,43,0.2)}
.result-text h3{font-size:15px;font-weight:600;margin-bottom:2px}
.result-banner.clear h3{color:var(--lime)}
.result-banner.warning h3{color:var(--amber)}
.result-banner.danger h3{color:#e74c3c}
.result-text p{font-size:12px;color:rgba(245,240,232,0.6);line-height:1.4}

/* Map */
#map{height:260px;border-radius:14px;margin-bottom:14px;border:1px solid var(--border);overflow:hidden;display:none}
#map.show{display:block}
.leaflet-container{background:#1a2620;font-family:'DM Sans',sans-serif}

/* Contact cards */
.contact-card{background:rgba(255,255,255,0.04);border:1px solid var(--border);border-radius:14px;padding:16px;margin-bottom:12px;animation:slideIn 0.4s ease both}
.contact-card.hyper{border-color:rgba(192,57,43,0.35);background:rgba(192,57,43,0.05)}
.contact-card.apiary{border-color:rgba(232,160,32,0.3);background:rgba(232,160,32,0.04)}
.contact-card-header{display:flex;justify-content:space-between;align-items:flex-start;gap:10px;margin-bottom:10px}
.contact-name{font-size:16px;font-weight:600;line-height:1.3}
.contact-type-badge{font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;padding:4px 8px;border-radius:6px;flex-shrink:0;white-space:nowrap}
.contact-type-badge.hyper{background:rgba(192,57,43,0.2);color:#e74c3c;border:1px solid rgba(192,57,43,0.4)}
.contact-type-badge.apiary{background:rgba(232,160,32,0.2);color:var(--amber);border:1px solid rgba(232,160,32,0.4)}
.distance-pill{font-size:11px;font-weight:600;color:var(--cream);background:rgba(0,0,0,0.4);padding:3px 9px;border-radius:10px;display:inline-block;margin-top:4px}
.contact-row{font-size:13px;color:rgba(245,240,232,0.75);margin:6px 0;display:flex;gap:8px;line-height:1.4}
.contact-row .lbl{color:var(--lime);font-weight:600;font-size:11px;letter-spacing:0.5px;text-transform:uppercase;min-width:60px;padding-top:1px}
.contact-row .val{flex:1;word-break:break-word}
.contact-row a{color:var(--lime);text-decoration:none}
.contact-row a:active{opacity:0.7}
.log-btn{margin-top:12px;padding:10px 14px;width:100%;background:rgba(126,200,80,0.1);border:1px solid rgba(126,200,80,0.3);color:var(--lime);border-radius:10px;font-size:13px;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif;-webkit-appearance:none;transition:background 0.2s}
.log-btn:active{background:rgba(126,200,80,0.2)}

/* Post-search actions */
.search-actions{display:flex;gap:8px;margin-top:14px;margin-bottom:14px}
.search-action-btn{flex:1;padding:13px 8px;border-radius:12px;font-size:12px;font-weight:600;font-family:'DM Sans',sans-serif;cursor:pointer;-webkit-appearance:none;display:flex;flex-direction:column;align-items:center;gap:4px;transition:transform 0.15s;text-decoration:none}
.search-action-btn:active{transform:scale(0.97)}
.search-action-btn .icon{font-size:18px;line-height:1}
.search-action-btn .lbl{font-size:11px;letter-spacing:0.5px}
.search-action-btn.swarm{background:linear-gradient(135deg,#7ec850,#2d7a47);color:var(--dark);border:none;box-shadow:0 4px 14px rgba(126,200,80,0.3)}
.search-action-btn.map{background:rgba(58,141,222,0.15);color:#5ba8e8;border:1px solid rgba(58,141,222,0.35)}
.search-action-btn.map:active{background:rgba(58,141,222,0.25)}

/* Log dialog */
.dialog-bg{position:fixed;inset:0;background:rgba(0,0,0,0.7);backdrop-filter:blur(4px);z-index:100;display:none;align-items:flex-end;justify-content:center;padding:20px;animation:fadeIn 0.2s ease}
.dialog-bg.show{display:flex}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.dialog{background:#1a2620;border:1px solid var(--border);border-radius:20px 20px 14px 14px;padding:22px 20px;max-width:420px;width:100%;animation:slideUp 0.3s ease;margin-bottom:env(safe-area-inset-bottom)}
@keyframes slideUp{from{transform:translateY(40px);opacity:0}to{transform:translateY(0);opacity:1}}
.dialog-title{font-family:'Bebas Neue',sans-serif;font-size:24px;letter-spacing:1px;margin-bottom:4px}
.dialog-sub{font-size:12px;color:rgba(245,240,232,0.5);margin-bottom:16px}
.dialog textarea{width:100%;padding:12px 14px;background:rgba(0,0,0,0.4);border:1px solid rgba(126,200,80,0.2);border-radius:10px;color:var(--cream);font-size:14px;font-family:'DM Sans',sans-serif;resize:vertical;min-height:80px;outline:none;-webkit-appearance:none}
.dialog textarea:focus{border-color:var(--lime)}
.dialog .form-group{margin-bottom:12px}
.dialog-actions{display:flex;gap:8px;margin-top:14px}
.dialog-actions button{flex:1;padding:13px;border-radius:11px;font-size:14px;font-weight:600;border:none;cursor:pointer;font-family:'DM Sans',sans-serif;-webkit-appearance:none}
.btn-cancel{background:rgba(245,240,232,0.08);color:rgba(245,240,232,0.6);border:1px solid rgba(245,240,232,0.1)}
.btn-cancel:active{background:rgba(245,240,232,0.12)}
.btn-save{background:linear-gradient(135deg,var(--lime),var(--green-mid));color:var(--dark)}
.btn-save:active{opacity:0.85}
.quick-notes{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:10px}
.quick-note{font-size:11px;padding:6px 10px;background:rgba(126,200,80,0.08);border:1px solid rgba(126,200,80,0.2);border-radius:14px;color:var(--lime);cursor:pointer;font-family:'DM Sans',sans-serif;-webkit-appearance:none}
.quick-note:active{background:rgba(126,200,80,0.15)}

/* Error / Empty */
.error-msg{padding:12px 16px;border-radius:10px;font-size:13px;font-weight:500;display:none;text-align:center;background:rgba(192,57,43,0.15);border:1px solid rgba(192,57,43,0.4);color:#e74c3c;margin-top:12px}
.error-msg.show{display:block}

.stats-bar{display:flex;gap:8px;margin-bottom:12px;font-size:11px;color:rgba(245,240,232,0.4);letter-spacing:1px;text-transform:uppercase;font-weight:600}
.stats-bar span{padding:4px 10px;background:rgba(126,200,80,0.05);border:1px solid rgba(126,200,80,0.1);border-radius:10px}

.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--lime);color:var(--dark);padding:12px 20px;border-radius:12px;font-size:13px;font-weight:600;z-index:200;box-shadow:0 8px 32px rgba(126,200,80,0.4);display:none;animation:toastIn 0.3s ease}
.toast.show{display:block}
@keyframes toastIn{from{opacity:0;transform:translate(-50%,20px)}to{opacity:1;transform:translate(-50%,0)}}

.hidden{display:none!important}
</style>
</head>
<body>
<div class="bg"></div>
<div class="container">
  <a href="index.html" class="back">← Dashboard</a>

  <div class="header">
    <div class="title">Address Search</div>
    <div class="subtitle">Check 500ft radius for hypers &amp; apiaries</div>
  </div>

  <div id="loadingRegistry" class="card">
    <div class="load-spinner"></div>
    <div>Loading registry from Google Sheets...</div>
  </div>

  <div id="mainContent" class="hidden">
    <div class="stats-bar" id="statsBar"></div>

    <div class="card">
      <label>Job Site Address</label>
      <input type="text" id="addressInput" placeholder="123 Main St, Harrisburg PA" autocomplete="off">
      <button class="btn" id="searchBtn" onclick="runSearch()">🔍 Check 500ft Radius</button>
      <div class="error-msg" id="errorMsg"></div>
    </div>

    <div id="resultArea"></div>
  </div>
</div>

<!-- Contact log dialog -->
<div class="dialog-bg" id="dialogBg">
  <div class="dialog">
    <div class="dialog-title">Log Contact</div>
    <div class="dialog-sub" id="dialogSub">—</div>
    <div class="form-group">
      <label>Phone Called</label>
      <input type="text" id="phoneCalled" placeholder="717-XXX-XXXX">
    </div>
    <div class="form-group">
      <label>Note</label>
      <div class="quick-notes">
        <button class="quick-note" onclick="setNote('Called, spoke directly')">Spoke directly</button>
        <button class="quick-note" onclick="setNote('Called, left voicemail')">Left voicemail</button>
        <button class="quick-note" onclick="setNote('No answer')">No answer</button>
        <button class="quick-note" onclick="setNote('Texted')">Texted</button>
      </div>
      <textarea id="noteText" placeholder="What happened..."></textarea>
    </div>
    <div class="dialog-actions">
      <button class="btn-cancel" onclick="closeDialog()">Cancel</button>
      <button class="btn-save" onclick="saveContactLog()" id="saveLogBtn">Save Log</button>
    </div>
  </div>
</div>

<!-- Swarm log dialog -->
<div class="dialog-bg" id="swarmDialogBg">
  <div class="dialog">
    <div class="dialog-title" style="color:#e8a020">🍯 Log Swarm</div>
    <div class="dialog-sub" id="swarmDialogSub">At searched address</div>
    <div class="form-group">
      <label>Status</label>
      <select id="swarmStatus" style="width:100%;padding:11px 14px;background:rgba(0,0,0,0.4);border:1px solid rgba(126,200,80,0.2);border-radius:10px;color:var(--cream);font-size:14px;font-family:'DM Sans',sans-serif;outline:none;-webkit-appearance:none">
        <option value="Active">🟢 Active — Still there</option>
        <option value="Retrieved">✅ Retrieved — Captured/relocated</option>
        <option value="Gone">⚪ Gone — No longer present</option>
      </select>
    </div>
    <div class="form-group">
      <label>Notes</label>
      <textarea id="swarmNotes" placeholder="Size, location specifics (tree branch, fence post), customer name, etc."></textarea>
    </div>
    <div class="dialog-actions">
      <button class="btn-cancel" onclick="closeSwarmDialog()">Cancel</button>
      <button class="btn-save" onclick="saveSwarm()" id="saveSwarmBtn">Save Swarm</button>
    </div>
  </div>
</div>

<div class="toast" id="toast">✓ Logged</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyCtBCUuQAHuQ1O8V2sXoFYBcfaL_samV4o",
  authDomain: "lpp-search.firebaseapp.com",
  projectId: "lpp-search",
  storageBucket: "lpp-search.firebasestorage.app",
  messagingSenderId: "566058509628",
  appId: "1:566058509628:web:beaf2b918377be9c152a39"
};

const SHEETS_API = "https://script.google.com/macros/s/AKfycbw5uhfIZeX-i0zGVNU6XllGZQ4TNTwA4THXRQWIS8pq3yKtMBqntV3slaEqGPAk-R5hDQ/exec";

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

let registry = [];
let currentUser = null;
let map = null;
let currentSearchPoint = null;
let currentContact = null;

// ── Auth guard ──────────────────────────────────────────
onAuthStateChanged(auth, async (user) => {
  if (!user) { window.location.href = 'index.html'; return; }
  currentUser = user;
  loadRegistry();
});

// ── Load registry ───────────────────────────────────────
async function loadRegistry() {
  // Try cache first for instant load
  const cached = localStorage.getItem('lpp_registry_v2');
  const cacheTime = localStorage.getItem('lpp_registry_v2_time');
  const now = Date.now();
  
  if (cached && cacheTime && (now - parseInt(cacheTime) < 86400000)) {
    // Cache less than 24h old — use it instantly
    registry = JSON.parse(cached);
    showMain();
    // Refresh in background
    fetchRegistry().catch(()=>{});
    return;
  }
  
  try {
    await fetchRegistry();
    showMain();
  } catch(e) {
    document.getElementById('loadingRegistry').innerHTML = 
      '<div style="color:#e74c3c">❌ Failed to load registry.<br><small style="color:rgba(245,240,232,0.5)">' + e.message + '</small></div>';
  }
}

async function fetchRegistry() {
  const res = await fetch(SHEETS_API + '?action=getRegistry');
  const data = await res.json();
  if (!data.records) throw new Error('No records returned');
  registry = data.records;
  localStorage.setItem('lpp_registry_v2', JSON.stringify(registry));
  localStorage.setItem('lpp_registry_v2_time', Date.now().toString());
}

function showMain() {
  document.getElementById('loadingRegistry').classList.add('hidden');
  document.getElementById('mainContent').classList.remove('hidden');
  const a = registry.filter(r => r.type === 'Apiary').length;
  const h = registry.filter(r => r.type === 'Hyper').length;
  document.getElementById('statsBar').innerHTML = 
    `<span>${a} Apiaries</span><span>${h} Hypers</span><span>${registry.length} Total</span>`;
}

// ── Geocoding ───────────────────────────────────────────
async function geocode(address) {
  const url = 'https://nominatim.openstreetmap.org/search?format=json&q=' + encodeURIComponent(address) + '&limit=1&countrycodes=us';
  const res = await fetch(url, { headers: { 'User-Agent': 'LPP-Search/1.0' } });
  const results = await res.json();
  if (!results || results.length === 0) return null;
  return { lat: parseFloat(results[0].lat), lng: parseFloat(results[0].lon), display: results[0].display_name };
}

// ── Distance calculation (Haversine) ───────────────────
function distanceFeet(lat1, lng1, lat2, lng2) {
  const R = 20902231; // Earth radius in feet
  const toRad = (d) => d * Math.PI / 180;
  const dLat = toRad(lat2 - lat1);
  const dLng = toRad(lng2 - lng1);
  const a = Math.sin(dLat/2)**2 + Math.cos(toRad(lat1)) * Math.cos(toRad(lat2)) * Math.sin(dLng/2)**2;
  return 2 * R * Math.asin(Math.sqrt(a));
}

// ── Geocode registry addresses that don't have coords ──
async function geocodeIfNeeded(record) {
  if (record.lat && record.lng) return record;
  // Try to geocode the address
  const cacheKey = 'geo_' + record.address;
  const cached = localStorage.getItem(cacheKey);
  if (cached) {
    const coords = JSON.parse(cached);
    record.lat = coords.lat;
    record.lng = coords.lng;
    return record;
  }
  try {
    const result = await geocode(record.address);
    if (result) {
      record.lat = result.lat;
      record.lng = result.lng;
      localStorage.setItem(cacheKey, JSON.stringify({lat: result.lat, lng: result.lng}));
    }
  } catch(e) { /* skip */ }
  return record;
}

// ── Run search ──────────────────────────────────────────
window.runSearch = async function() {
  const address = document.getElementById('addressInput').value.trim();
  const errorMsg = document.getElementById('errorMsg');
  const btn = document.getElementById('searchBtn');
  const resultArea = document.getElementById('resultArea');
  
  errorMsg.classList.remove('show');
  
  if (!address) {
    errorMsg.textContent = 'Please enter an address';
    errorMsg.classList.add('show');
    return;
  }
  
  btn.disabled = true;
  btn.innerHTML = '<span class="btn-spinner"></span>Searching...';
  resultArea.innerHTML = '';
  
  try {
    const point = await geocode(address);
    if (!point) {
      throw new Error('Address not found. Try a more specific address.');
    }
    currentSearchPoint = point;
    
    // Check all records — assumes pre-geocoded (run Admin → Geocode Registry once)
    btn.innerHTML = '<span class="btn-spinner"></span>Checking radius...';
    
    const nearby = [];
    const RADIUS = 500;
    let skippedNoCoords = 0;
    
    for (const record of registry) {
      if (!record.lat || !record.lng) {
        skippedNoCoords++;
        continue;
      }
      const dist = distanceFeet(point.lat, point.lng, record.lat, record.lng);
      if (dist <= RADIUS) {
        nearby.push({ ...record, distance: Math.round(dist) });
      }
    }
    
    if (skippedNoCoords > 0) {
      console.warn(skippedNoCoords + ' records skipped (no GPS). Run Admin → Geocode Registry to fix.');
    }
    
    // Sort: hypers first, then by distance
    nearby.sort((a, b) => {
      if (a.type !== b.type) return a.type === 'Hyper' ? -1 : 1;
      return a.distance - b.distance;
    });
    
    displayResults(address, point, nearby);
    
    // Log the search
    logSearchToSheet(address, point, nearby);
    
  } catch(e) {
    errorMsg.textContent = e.message;
    errorMsg.classList.add('show');
  } finally {
    btn.disabled = false;
    btn.innerHTML = '🔍 Check 500ft Radius';
  }
};

function displayResults(address, point, nearby) {
  const resultArea = document.getElementById('resultArea');
  const hypers = nearby.filter(r => r.type === 'Hyper');
  const apiaries = nearby.filter(r => r.type === 'Apiary');
  
  let html = '';
  
  // Banner
  if (nearby.length === 0) {
    html += `<div class="result-banner clear">
      <div class="result-icon">✓</div>
      <div class="result-text">
        <h3>All Clear — Safe to Treat</h3>
        <p>No hypersensitive individuals or apiaries within 500ft</p>
      </div>
    </div>`;
  } else if (hypers.length > 0) {
    html += `<div class="result-banner danger">
      <div class="result-icon">⚠️</div>
      <div class="result-text">
        <h3>${hypers.length} Hypersensitive Found</h3>
        <p>Must notify before treatment. ${apiaries.length} apiaries also nearby.</p>
      </div>
    </div>`;
  } else {
    html += `<div class="result-banner warning">
      <div class="result-icon">🐝</div>
      <div class="result-text">
        <h3>${apiaries.length} Apiar${apiaries.length===1?'y':'ies'} Found</h3>
        <p>Consider notifying for swarm calls or mosquito treatments</p>
      </div>
    </div>`;
  }
  
  // Map
  html += '<div id="map" class="show"></div>';
  
  // Contact cards
  for (const r of nearby) {
    html += renderContactCard(r);
  }
  
  // Action buttons (always shown after a search)
  html += `
    <div class="search-actions">
      <button class="search-action-btn swarm" onclick="openSwarmFromSearch()">
        <span class="icon">🍯</span>
        <span class="lbl">Log Swarm Here</span>
      </button>
      <a class="search-action-btn map" href="map.html">
        <span class="icon">📍</span>
        <span class="lbl">Open Live Map</span>
      </a>
    </div>
  `;
  
  resultArea.innerHTML = html;
  
  // Init map
  if (map) map.remove();
  map = L.map('map', { zoomControl: true, attributionControl: false }).setView([point.lat, point.lng], 17);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { maxZoom: 19 }).addTo(map);
  
  // Search point + 500ft circle
  L.marker([point.lat, point.lng]).addTo(map).bindPopup('Job Site<br>' + address);
  L.circle([point.lat, point.lng], { radius: 152.4, color: '#7ec850', fillColor: '#7ec850', fillOpacity: 0.15, weight: 2 }).addTo(map);
  
  // Hyper/Apiary pins
  for (const r of nearby) {
    const icon = L.divIcon({
      className: 'custom-pin',
      html: `<div style="background:${r.type==='Hyper'?'#c0392b':'#e8a020'};width:24px;height:24px;border-radius:50%;border:3px solid #fff;box-shadow:0 2px 6px rgba(0,0,0,0.5);display:flex;align-items:center;justify-content:center;font-size:11px;color:#fff;font-weight:700">${r.type==='Hyper'?'!':'🐝'}</div>`,
      iconSize: [24, 24], iconAnchor: [12, 12]
    });
    L.marker([r.lat, r.lng], { icon }).addTo(map).bindPopup(`<b>${r.name}</b><br>${r.type} — ${r.distance}ft<br>${r.address}`);
  }
}

function renderContactCard(r) {
  const phones = [];
  if (r.phoneDay) phones.push({label:'Day', num:r.phoneDay});
  if (r.phoneNight && r.phoneNight !== r.phoneDay) phones.push({label:'Night', num:r.phoneNight});
  if (r.phoneAlt && r.phoneAlt !== r.phoneDay) phones.push({label:'Alt', num:r.phoneAlt});
  
  const phoneHtml = phones.map(p => 
    `<div class="contact-row"><span class="lbl">${p.label}</span><span class="val"><a href="tel:${p.num.replace(/[^0-9]/g,'')}">${p.num}</a></span></div>`
  ).join('');
  
  return `
    <div class="contact-card ${r.type.toLowerCase()}">
      <div class="contact-card-header">
        <div>
          <div class="contact-name">${escapeHtml(r.name)}</div>
          <div class="distance-pill">📍 ${r.distance} ft away</div>
        </div>
        <div class="contact-type-badge ${r.type.toLowerCase()}">${r.type==='Hyper'?'⚠️ Hyper':'🐝 Apiary'}</div>
      </div>
      <div class="contact-row"><span class="lbl">Address</span><span class="val">${escapeHtml(r.address)}</span></div>
      ${phoneHtml}
      ${r.email ? `<div class="contact-row"><span class="lbl">Email</span><span class="val"><a href="mailto:${r.email}">${r.email}</a></span></div>` : ''}
      <div class="contact-row"><span class="lbl">Township</span><span class="val">${escapeHtml(r.township)}</span></div>
      <button class="log-btn" onclick='openLogDialog(${JSON.stringify(r).replace(/'/g, "&apos;")})'>📝 Log Contact</button>
    </div>
  `;
}

function escapeHtml(s) {
  if (!s) return '';
  return String(s).replace(/[<>&"']/g, c => ({'<':'&lt;','>':'&gt;','&':'&amp;','"':'&quot;',"'":'&apos;'}[c]));
}

// ── Contact log dialog ──────────────────────────────────
window.openLogDialog = function(record) {
  currentContact = record;
  document.getElementById('dialogSub').textContent = record.name + ' — ' + record.type;
  document.getElementById('phoneCalled').value = record.phoneDay || '';
  document.getElementById('noteText').value = '';
  document.getElementById('dialogBg').classList.add('show');
};

window.closeDialog = function() {
  document.getElementById('dialogBg').classList.remove('show');
  currentContact = null;
};

window.setNote = function(text) {
  document.getElementById('noteText').value = text;
};

window.saveContactLog = async function() {
  const btn = document.getElementById('saveLogBtn');
  const phone = document.getElementById('phoneCalled').value.trim();
  const note = document.getElementById('noteText').value.trim();
  
  if (!note) { alert('Please add a note'); return; }
  
  btn.disabled = true;
  btn.innerHTML = '<span class="btn-spinner"></span>Saving...';
  
  const localUser = JSON.parse(localStorage.getItem('lpp_user') || '{}');
  
  try {
    await fetch(SHEETS_API, {
      method: 'POST',
      mode: 'no-cors',
      body: JSON.stringify({
        action: 'logContact',
        contactType: currentContact.type,
        userEmail: currentUser.email,
        userName: localUser.name || currentUser.email,
        contactName: currentContact.name,
        contactAddress: currentContact.address,
        phoneCalled: phone,
        note: note,
        searchedAddress: document.getElementById('addressInput').value.trim()
      })
    });
    closeDialog();
    showToast('✓ Contact logged');
  } catch(e) {
    alert('Failed to save: ' + e.message);
  } finally {
    btn.disabled = false;
    btn.innerHTML = 'Save Log';
  }
};

// ── Swarm dialog ─────────────────────────────────────────
window.openSwarmFromSearch = function() {
  if (!currentSearchPoint) {
    alert('No search point set — please search an address first');
    return;
  }
  document.getElementById('swarmDialogSub').textContent = document.getElementById('addressInput').value.trim();
  document.getElementById('swarmStatus').value = 'Active';
  document.getElementById('swarmNotes').value = '';
  document.getElementById('swarmDialogBg').classList.add('show');
};

window.closeSwarmDialog = function() {
  document.getElementById('swarmDialogBg').classList.remove('show');
};

window.saveSwarm = async function() {
  if (!currentSearchPoint) return;
  const btn = document.getElementById('saveSwarmBtn');
  const status = document.getElementById('swarmStatus').value;
  const notes = document.getElementById('swarmNotes').value.trim();
  const address = document.getElementById('addressInput').value.trim();
  
  btn.disabled = true;
  btn.innerHTML = '<span class="btn-spinner"></span>Saving...';
  
  const localUser = JSON.parse(localStorage.getItem('lpp_user') || '{}');
  
  // Find likely sources (apiaries within 2 miles)
  const nearby = registry.filter(r => 
    r.type === 'Apiary' && r.lat && r.lng &&
    distanceFeet(currentSearchPoint.lat, currentSearchPoint.lng, r.lat, r.lng) <= 10560
  ).map(r => r.name).slice(0, 5);
  
  try {
    await fetch(SHEETS_API, {
      method: 'POST',
      mode: 'no-cors',
      body: JSON.stringify({
        action: 'addSwarm',
        date: new Date().toISOString(),
        address: address,
        lat: currentSearchPoint.lat,
        lng: currentSearchPoint.lng,
        status: status,
        notes: notes,
        loggedBy: localUser.name || currentUser.email,
        loggedByEmail: currentUser.email,
        likelySource: nearby.join('; ')
      })
    });
    
    // Clear local swarms cache so map.html refreshes
    localStorage.removeItem('lpp_swarms');
    
    closeSwarmDialog();
    showToast('✓ Swarm logged');
  } catch(e) {
    alert('Failed to save: ' + e.message);
  } finally {
    btn.disabled = false;
    btn.innerHTML = 'Save Swarm';
  }
};

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2200);
}

function logSearchToSheet(address, point, nearby) {
  const localUser = JSON.parse(localStorage.getItem('lpp_user') || '{}');
  const hypers = nearby.filter(r => r.type === 'Hyper').length;
  const apiaries = nearby.filter(r => r.type === 'Apiary').length;
  let result = 'Clear';
  if (hypers > 0) result = `${hypers} hyper${hypers>1?'s':''}, ${apiaries} apiary${apiaries===1?'':'ies'}`;
  else if (apiaries > 0) result = `${apiaries} apiary${apiaries===1?'':'ies'}`;
  
  fetch(SHEETS_API, {
    method: 'POST',
    mode: 'no-cors',
    body: JSON.stringify({
      action: 'logSearch',
      userEmail: currentUser.email,
      userName: localUser.name || currentUser.email,
      address: address,
      lat: point.lat, lng: point.lng,
      hyperCount: hypers, apiaryCount: apiaries,
      result: result
    })
  }).catch(()=>{});
}

// Allow Enter to search
document.getElementById('addressInput').addEventListener('keypress', (e) => {
  if (e.key === 'Enter') runSearch();
});
</script>
