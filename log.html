<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="LPP Search">
<meta name="theme-color" content="#0d1f13">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<title>Contact Log — LPP</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;600;700&family=DM+Mono&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--green:#1a4d2e;--green-mid:#2d7a47;--lime:#7ec850;--cream:#f5f0e8;--amber:#e8a020;--red:#c0392b;--dark:#0d1f13;--border:rgba(126,200,80,0.25)}
html,body{height:100%;font-family:'DM Sans',sans-serif;background:var(--dark);color:var(--cream)}
.bg{position:fixed;inset:0;z-index:0;background:radial-gradient(ellipse 80% 60% at 20% 10%,rgba(45,122,71,0.35) 0%,transparent 60%),radial-gradient(ellipse 60% 80% at 85% 90%,rgba(26,77,46,0.4) 0%,transparent 55%),radial-gradient(ellipse 100% 100% at 50% 50%,#0d1f13 0%,#060e09 100%)}
.container{position:relative;z-index:10;max-width:480px;margin:0 auto;padding:20px 16px 40px;min-height:100vh}
.back{display:inline-flex;align-items:center;gap:6px;color:var(--lime);text-decoration:none;font-size:13px;font-weight:500;margin-bottom:16px;opacity:0.7;padding:8px 12px;background:rgba(126,200,80,0.05);border:1px solid rgba(126,200,80,0.15);border-radius:10px}
.back:active{background:rgba(126,200,80,0.1)}
.title{font-family:'Bebas Neue',sans-serif;font-size:32px;letter-spacing:1px;margin-bottom:4px;line-height:1}
.subtitle{font-size:13px;color:rgba(245,240,232,0.5);margin-bottom:16px}

/* Filters */
.filter-bar{display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap}
.filter-pill{padding:8px 14px;background:rgba(0,0,0,0.3);border:1px solid rgba(126,200,80,0.15);border-radius:20px;color:rgba(245,240,232,0.6);font-size:12px;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif;-webkit-appearance:none;letter-spacing:0.3px;transition:all 0.2s}
.filter-pill.active{background:linear-gradient(135deg,var(--green-mid),var(--green));color:var(--cream);border-color:var(--lime)}
.filter-pill:active{transform:scale(0.96)}

.scope-toggle{display:flex;background:rgba(0,0,0,0.3);border-radius:11px;padding:3px;margin-bottom:12px;border:1px solid rgba(126,200,80,0.1)}
.scope-toggle button{flex:1;padding:8px;font-size:12px;font-weight:600;border:none;background:transparent;color:rgba(245,240,232,0.4);border-radius:8px;cursor:pointer;font-family:'DM Sans',sans-serif;-webkit-appearance:none;letter-spacing:0.5px}
.scope-toggle button.active{background:linear-gradient(135deg,var(--green-mid),var(--green));color:var(--cream);box-shadow:0 2px 8px rgba(45,122,71,0.3)}

input[type="text"]{width:100%;padding:13px 16px;background:rgba(0,0,0,0.35);border:1px solid rgba(126,200,80,0.2);border-radius:12px;color:var(--cream);font-size:15px;font-family:'DM Sans',sans-serif;outline:none;-webkit-appearance:none;margin-bottom:12px}
input[type="text"]:focus{border-color:var(--lime)}
input::placeholder{color:rgba(245,240,232,0.25)}

.loading{text-align:center;padding:60px 20px;color:rgba(245,240,232,0.5)}
.load-spinner{display:inline-block;width:24px;height:24px;border:3px solid rgba(126,200,80,0.2);border-top-color:var(--lime);border-radius:50%;animation:spin 0.8s linear infinite;margin-bottom:12px}
@keyframes spin{to{transform:rotate(360deg)}}

.empty{text-align:center;padding:60px 20px;color:rgba(245,240,232,0.4);font-size:14px}
.empty-icon{font-size:42px;margin-bottom:12px;opacity:0.4}

.log-card{background:rgba(255,255,255,0.04);border:1px solid var(--border);border-radius:14px;padding:14px;margin-bottom:10px;animation:slideIn 0.3s ease both}
@keyframes slideIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.log-card.hyper{border-color:rgba(192,57,43,0.35);background:rgba(192,57,43,0.04)}
.log-card.apiary{border-color:rgba(232,160,32,0.3);background:rgba(232,160,32,0.04)}

.log-header{display:flex;justify-content:space-between;align-items:flex-start;gap:10px;margin-bottom:8px}
.log-name{font-size:15px;font-weight:600;line-height:1.3}
.log-time{font-size:11px;color:rgba(245,240,232,0.4);white-space:nowrap;font-family:'DM Mono',monospace}
.log-type{font-size:9px;font-weight:700;letter-spacing:1px;text-transform:uppercase;padding:3px 7px;border-radius:5px;display:inline-block;margin-bottom:6px}
.log-type.hyper{background:rgba(192,57,43,0.2);color:#e74c3c;border:1px solid rgba(192,57,43,0.4)}
.log-type.apiary{background:rgba(232,160,32,0.2);color:var(--amber);border:1px solid rgba(232,160,32,0.4)}

.log-row{font-size:13px;color:rgba(245,240,232,0.75);margin:5px 0;display:flex;gap:8px;line-height:1.4}
.log-row .lbl{color:var(--lime);font-weight:600;font-size:10px;letter-spacing:0.5px;text-transform:uppercase;min-width:56px;padding-top:2px}
.log-row .val{flex:1;word-break:break-word}
.log-row a{color:var(--lime);text-decoration:none}

.log-note{margin-top:8px;padding:9px 12px;background:rgba(0,0,0,0.25);border-left:3px solid var(--lime);border-radius:6px;font-size:13px;color:rgba(245,240,232,0.85);line-height:1.4;font-style:italic}

.log-user{font-size:11px;color:rgba(245,240,232,0.4);margin-top:8px;padding-top:8px;border-top:1px solid rgba(245,240,232,0.05)}

.stat-bar{display:flex;gap:8px;margin-bottom:14px;font-size:11px;letter-spacing:0.8px;text-transform:uppercase;font-weight:600}
.stat-pill{padding:6px 12px;background:rgba(126,200,80,0.05);border:1px solid rgba(126,200,80,0.1);border-radius:10px;color:rgba(245,240,232,0.5)}
.stat-pill strong{color:var(--lime);font-size:13px}

.refresh-btn{display:flex;align-items:center;justify-content:center;gap:6px;width:100%;padding:11px;background:transparent;border:1px solid rgba(126,200,80,0.15);border-radius:10px;color:var(--lime);font-size:12px;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif;margin-bottom:14px;-webkit-appearance:none;letter-spacing:0.5px;text-transform:uppercase}
.refresh-btn:active{background:rgba(126,200,80,0.08)}

.hidden{display:none!important}
</style>
</head>
<body>
<div class="bg"></div>
<div class="container">
  <a href="index.html" class="back">← Dashboard</a>
  <div class="title">Contact Log</div>
  <div class="subtitle">Hyper &amp; Apiary call history</div>

  <div id="adminScope" class="scope-toggle hidden">
    <button class="active" onclick="setScope('mine')" id="scopeMine">My Logs</button>
    <button onclick="setScope('all')" id="scopeAll">Everyone</button>
  </div>

  <div class="filter-bar">
    <button class="filter-pill active" onclick="setFilter('all')" id="filterAll">All</button>
    <button class="filter-pill" onclick="setFilter('hyper')" id="filterHyper">⚠️ Hypers</button>
    <button class="filter-pill" onclick="setFilter('apiary')" id="filterApiary">🐝 Apiaries</button>
  </div>

  <input type="text" id="searchInput" placeholder="Search by name, address, or note..." oninput="renderLogs()">

  <button class="refresh-btn" onclick="loadLogs(true)">↻ Refresh from Sheet</button>

  <div class="stat-bar" id="statBar"></div>

  <div id="content">
    <div class="loading">
      <div class="load-spinner"></div>
      <div>Loading logs...</div>
    </div>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyCtBCUuQAHuQ1O8V2sXoFYBcfaL_samV4o",
  authDomain: "lpp-search.firebaseapp.com",
  projectId: "lpp-search",
  storageBucket: "lpp-search.firebasestorage.app",
  messagingSenderId: "566058509628",
  appId: "1:566058509628:web:beaf2b918377be9c152a39"
};

const SHEETS_API = "https://script.google.com/macros/s/AKfycbw5uhfIZeX-i0zGVNU6XllGZQ4TNTwA4THXRQWIS8pq3yKtMBqntV3slaEqGPAk-R5hDQ/exec";

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

let allLogs = [];
let currentUser = null;
let userRole = 'employee';
let scope = 'mine';    // 'mine' or 'all'
let filter = 'all';    // 'all', 'hyper', 'apiary'

onAuthStateChanged(auth, async (user) => {
  if (!user) { window.location.href = 'index.html'; return; }
  currentUser = user;
  const localUser = JSON.parse(localStorage.getItem('lpp_user') || '{}');
  userRole = localUser.role || 'employee';
  if (userRole === 'admin') {
    document.getElementById('adminScope').classList.remove('hidden');
  }
  loadLogs();
});

async function loadLogs(force) {
  if (force) {
    localStorage.removeItem('lpp_contact_logs');
    localStorage.removeItem('lpp_contact_logs_time');
  }
  
  // Try cache (1 hour)
  const cached = localStorage.getItem('lpp_contact_logs');
  const cacheTime = localStorage.getItem('lpp_contact_logs_time');
  if (cached && cacheTime && (Date.now() - parseInt(cacheTime) < 3600000)) {
    allLogs = JSON.parse(cached);
    renderLogs();
    fetchLogs().catch(()=>{}); // refresh in background
    return;
  }
  
  try {
    await fetchLogs();
    renderLogs();
  } catch(e) {
    document.getElementById('content').innerHTML = 
      `<div class="empty"><div class="empty-icon">⚠️</div>Failed to load logs<br><small>${e.message}</small></div>`;
  }
}

async function fetchLogs() {
  const res = await fetch(SHEETS_API + '?action=getContactLogs');
  const data = await res.json();
  if (data.error) throw new Error(data.error);
  allLogs = data.logs || [];
  localStorage.setItem('lpp_contact_logs', JSON.stringify(allLogs));
  localStorage.setItem('lpp_contact_logs_time', Date.now().toString());
}

window.setScope = function(s) {
  scope = s;
  document.getElementById('scopeMine').classList.toggle('active', s === 'mine');
  document.getElementById('scopeAll').classList.toggle('active', s === 'all');
  renderLogs();
};

window.setFilter = function(f) {
  filter = f;
  ['all','hyper','apiary'].forEach(x => {
    const el = document.getElementById('filter' + x.charAt(0).toUpperCase()+x.slice(1));
    if (el) el.classList.toggle('active', f === x);
  });
  renderLogs();
};

window.renderLogs = function() {
  const search = document.getElementById('searchInput').value.trim().toLowerCase();
  let logs = allLogs.slice();
  
  // Scope filter
  if (userRole !== 'admin' || scope === 'mine') {
    logs = logs.filter(l => (l.userEmail || '').toLowerCase() === (currentUser.email || '').toLowerCase());
  }
  
  // Type filter
  if (filter === 'hyper')  logs = logs.filter(l => l.type === 'Hyper');
  if (filter === 'apiary') logs = logs.filter(l => l.type === 'Apiary');
  
  // Search filter
  if (search) {
    logs = logs.filter(l => 
      (l.contactName || '').toLowerCase().includes(search) ||
      (l.contactAddress || '').toLowerCase().includes(search) ||
      (l.note || '').toLowerCase().includes(search) ||
      (l.searchedAddress || '').toLowerCase().includes(search)
    );
  }
  
  // Stats
  const h = logs.filter(l => l.type === 'Hyper').length;
  const a = logs.filter(l => l.type === 'Apiary').length;
  document.getElementById('statBar').innerHTML = 
    `<div class="stat-pill"><strong>${logs.length}</strong> total</div>` +
    `<div class="stat-pill"><strong>${h}</strong> hyper</div>` +
    `<div class="stat-pill"><strong>${a}</strong> apiary</div>`;
  
  // Render
  const content = document.getElementById('content');
  if (logs.length === 0) {
    let msg = 'No contact logs yet';
    if (search) msg = 'No logs match your search';
    else if (filter !== 'all') msg = `No ${filter} logs yet`;
    content.innerHTML = `<div class="empty"><div class="empty-icon">📋</div>${msg}</div>`;
    return;
  }
  
  let html = '';
  for (const log of logs) {
    html += renderLogCard(log);
  }
  content.innerHTML = html;
};

function renderLogCard(log) {
  const t = new Date(log.timestamp);
  const dateStr = t.toLocaleDateString('en-US', {month:'short', day:'numeric', year:'numeric'});
  const timeStr = t.toLocaleTimeString('en-US', {hour:'numeric', minute:'2-digit'});
  const typeClass = log.type.toLowerCase();
  
  return `
    <div class="log-card ${typeClass}">
      <div class="log-header">
        <div style="flex:1">
          <div class="log-type ${typeClass}">${log.type === 'Hyper' ? '⚠️ HYPER' : '🐝 APIARY'}</div>
          <div class="log-name">${escapeHtml(log.contactName)}</div>
        </div>
        <div class="log-time">${dateStr}<br>${timeStr}</div>
      </div>
      <div class="log-row"><span class="lbl">Address</span><span class="val">${escapeHtml(log.contactAddress)}</span></div>
      ${log.phoneCalled ? `<div class="log-row"><span class="lbl">Phone</span><span class="val"><a href="tel:${log.phoneCalled.replace(/[^0-9]/g,'')}">${escapeHtml(log.phoneCalled)}</a></span></div>` : ''}
      ${log.searchedAddress ? `<div class="log-row"><span class="lbl">Job</span><span class="val">${escapeHtml(log.searchedAddress)}</span></div>` : ''}
      ${log.note ? `<div class="log-note">"${escapeHtml(log.note)}"</div>` : ''}
      <div class="log-user">Logged by ${escapeHtml(log.userName || log.userEmail)}</div>
    </div>
  `;
}

function escapeHtml(s) {
  if (!s) return '';
  return String(s).replace(/[<>&"']/g, c => ({'<':'&lt;','>':'&gt;','&':'&amp;','"':'&quot;',"'":'&apos;'}[c]));
}
</script>
</body>
</html>
