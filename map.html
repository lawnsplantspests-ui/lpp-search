<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="LPP Search">
<meta name="theme-color" content="#0d1f13">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<title>Live Map — LPP</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;600;700&family=DM+Mono&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--green:#1a4d2e;--green-mid:#2d7a47;--lime:#7ec850;--cream:#f5f0e8;--amber:#e8a020;--red:#c0392b;--dark:#0d1f13;--blue:#3a8dde;--border:rgba(126,200,80,0.25)}
html,body{height:100%;font-family:'DM Sans',sans-serif;background:var(--dark);color:var(--cream);overflow:hidden}

/* Top bar */
.topbar{position:fixed;top:0;left:0;right:0;z-index:20;background:linear-gradient(to bottom,rgba(13,31,19,0.95) 0%,rgba(13,31,19,0.7) 80%,transparent 100%);padding:12px 14px 24px;backdrop-filter:blur(10px)}
.topbar-row{display:flex;justify-content:space-between;align-items:center;gap:8px}
.back{display:inline-flex;align-items:center;gap:5px;color:var(--lime);text-decoration:none;font-size:13px;font-weight:600;padding:8px 12px;background:rgba(0,0,0,0.4);border:1px solid rgba(126,200,80,0.2);border-radius:10px}
.back:active{background:rgba(0,0,0,0.6)}
.title{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:1.5px;line-height:1}

/* Map */
#map{position:fixed;inset:0;background:#1a2620;z-index:1}
.leaflet-container{background:#1a2620;font-family:'DM Sans',sans-serif}
.leaflet-popup-content-wrapper{background:#1a2620;color:var(--cream);border:1px solid var(--border);border-radius:10px}
.leaflet-popup-tip{background:#1a2620}
.leaflet-popup-content{margin:10px 14px;font-size:13px;line-height:1.45}
.leaflet-popup-content b{color:var(--lime);font-size:14px}
.leaflet-popup-close-button{color:var(--cream)!important}
.leaflet-control-zoom a{background:rgba(13,31,19,0.9)!important;color:var(--lime)!important;border:1px solid var(--border)!important}

/* Layer toggles */
.layer-toggles{position:fixed;top:60px;left:50%;transform:translateX(-50%);z-index:15;display:flex;gap:6px;padding:6px;background:rgba(13,31,19,0.92);border:1px solid var(--border);border-radius:30px;backdrop-filter:blur(20px);box-shadow:0 8px 24px rgba(0,0,0,0.4)}
.layer-btn{padding:8px 12px;font-size:11px;font-weight:700;border:none;background:transparent;color:rgba(245,240,232,0.5);border-radius:22px;cursor:pointer;font-family:'DM Sans',sans-serif;-webkit-appearance:none;letter-spacing:0.5px;display:flex;align-items:center;gap:4px;transition:all 0.2s}
.layer-btn.active{color:var(--cream);box-shadow:0 2px 8px rgba(0,0,0,0.3)}
.layer-btn.active.apiary{background:linear-gradient(135deg,#e8a020,#b06f0f)}
.layer-btn.active.hyper{background:linear-gradient(135deg,#c0392b,#8b2e22)}
.layer-btn.active.swarm{background:linear-gradient(135deg,#7ec850,#2d7a47)}

/* Bottom action bar */
.bottom-bar{position:fixed;bottom:0;left:0;right:0;z-index:15;padding:16px 14px calc(16px + env(safe-area-inset-bottom));background:linear-gradient(to top,rgba(13,31,19,0.95) 0%,rgba(13,31,19,0.85) 70%,transparent 100%);display:flex;gap:8px;backdrop-filter:blur(10px)}
.action-btn{flex:1;padding:13px 10px;border:1px solid var(--border);border-radius:13px;background:rgba(13,31,19,0.85);color:var(--cream);font-size:12px;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif;-webkit-appearance:none;display:flex;flex-direction:column;align-items:center;gap:3px;backdrop-filter:blur(10px)}
.action-btn:active{transform:scale(0.97);background:rgba(126,200,80,0.1)}
.action-btn .icon{font-size:18px;line-height:1}
.action-btn .lbl{font-size:10px;letter-spacing:0.5px;opacity:0.85}
.action-btn.primary{background:linear-gradient(135deg,var(--lime),var(--green-mid));color:var(--dark);border:none;box-shadow:0 4px 16px rgba(126,200,80,0.4)}
.action-btn.primary .lbl{opacity:1;font-weight:700}

/* Stats overlay */
.stats-overlay{position:fixed;top:110px;left:14px;z-index:14;background:rgba(13,31,19,0.85);border:1px solid var(--border);border-radius:10px;padding:8px 12px;font-size:11px;font-family:'DM Mono',monospace;color:rgba(245,240,232,0.6);backdrop-filter:blur(10px)}
.stats-overlay .accuracy{color:var(--lime)}
.stats-overlay .stale{color:var(--amber)}
.stats-overlay .error{color:#e74c3c}

/* Loading */
#loadingOverlay{position:fixed;inset:0;z-index:30;background:var(--dark);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px}
.load-spinner{width:32px;height:32px;border:3px solid rgba(126,200,80,0.2);border-top-color:var(--lime);border-radius:50%;animation:spin 0.8s linear infinite}
.load-text{font-size:12px;color:rgba(245,240,232,0.5);letter-spacing:2px;text-transform:uppercase}
@keyframes spin{to{transform:rotate(360deg)}}

/* GPS pulse dot */
.user-dot{width:22px;height:22px;background:var(--blue);border:3px solid #fff;border-radius:50%;box-shadow:0 0 0 4px rgba(58,141,222,0.35),0 2px 8px rgba(0,0,0,0.5);position:relative}
.user-dot::before{content:"";position:absolute;inset:-12px;border-radius:50%;background:rgba(58,141,222,0.15);animation:pulse 2s ease-out infinite}
@keyframes pulse{0%{transform:scale(0.5);opacity:1}100%{transform:scale(2);opacity:0}}

/* Dialog */
.dialog-bg{position:fixed;inset:0;background:rgba(0,0,0,0.75);backdrop-filter:blur(6px);z-index:100;display:none;align-items:flex-end;justify-content:center;padding:16px;animation:fadeIn 0.2s ease}
.dialog-bg.show{display:flex}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.dialog{background:#1a2620;border:1px solid var(--border);border-radius:18px;padding:22px 20px;max-width:420px;width:100%;animation:slideUp 0.3s ease;margin-bottom:env(safe-area-inset-bottom);max-height:85vh;overflow-y:auto}
@keyframes slideUp{from{transform:translateY(40px);opacity:0}to{transform:translateY(0);opacity:1}}
.dialog-title{font-family:'Bebas Neue',sans-serif;font-size:24px;letter-spacing:1px;margin-bottom:4px;color:var(--amber)}
.dialog-sub{font-size:12px;color:rgba(245,240,232,0.5);margin-bottom:16px}
.dialog label{display:block;font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--lime);margin-bottom:6px;opacity:0.9}
.dialog input[type="text"],.dialog textarea,.dialog select{width:100%;padding:11px 14px;background:rgba(0,0,0,0.4);border:1px solid rgba(126,200,80,0.2);border-radius:10px;color:var(--cream);font-size:14px;font-family:'DM Sans',sans-serif;outline:none;-webkit-appearance:none}
.dialog input:focus,.dialog textarea:focus,.dialog select:focus{border-color:var(--lime)}
.dialog textarea{resize:vertical;min-height:70px}
.dialog .form-group{margin-bottom:12px}
.dialog-actions{display:flex;gap:8px;margin-top:14px}
.dialog-actions button{flex:1;padding:13px;border-radius:11px;font-size:14px;font-weight:600;border:none;cursor:pointer;font-family:'DM Sans',sans-serif;-webkit-appearance:none}
.btn-cancel{background:rgba(245,240,232,0.08);color:rgba(245,240,232,0.6);border:1px solid rgba(245,240,232,0.1)}
.btn-save{background:linear-gradient(135deg,var(--lime),var(--green-mid));color:var(--dark)}
.btn-spinner{display:inline-block;width:14px;height:14px;border:2px solid rgba(13,31,19,0.3);border-top-color:var(--dark);border-radius:50%;animation:spin 0.7s linear infinite;vertical-align:middle;margin-right:8px}

.location-source{display:flex;gap:6px;margin-bottom:10px}
.source-btn{flex:1;padding:9px;font-size:12px;font-weight:600;background:rgba(0,0,0,0.3);border:1px solid rgba(126,200,80,0.15);border-radius:8px;color:rgba(245,240,232,0.5);cursor:pointer;font-family:'DM Sans',sans-serif;-webkit-appearance:none}
.source-btn.active{background:rgba(126,200,80,0.15);border-color:var(--lime);color:var(--lime)}

.coords-display{padding:9px 12px;background:rgba(0,0,0,0.4);border:1px solid rgba(126,200,80,0.15);border-radius:8px;font-family:'DM Mono',monospace;font-size:11px;color:rgba(245,240,232,0.6);margin-bottom:10px;word-break:break-all}

.toast{position:fixed;top:20px;left:50%;transform:translateX(-50%);background:var(--lime);color:var(--dark);padding:12px 20px;border-radius:12px;font-size:13px;font-weight:600;z-index:200;box-shadow:0 8px 32px rgba(126,200,80,0.4);display:none}
.toast.show{display:block;animation:toastIn 0.3s ease}
@keyframes toastIn{from{opacity:0;transform:translate(-50%,-20px)}to{opacity:1;transform:translate(-50%,0)}}

.hidden{display:none!important}
</style>
</head>
<body>

<!-- Loading overlay -->
<div id="loadingOverlay">
  <div class="load-spinner"></div>
  <div class="load-text">Loading map...</div>
</div>

<!-- Map -->
<div id="map"></div>

<!-- Top bar -->
<div class="topbar">
  <div class="topbar-row">
    <a href="index.html" class="back">← Dashboard</a>
    <div class="title">LIVE MAP</div>
    <div style="width:80px"></div>
  </div>
</div>

<!-- Layer toggles -->
<div class="layer-toggles">
  <button class="layer-btn active apiary" id="layerApiary" onclick="toggleLayer('apiary')">🐝 <span id="cApiary">0</span></button>
  <button class="layer-btn active hyper" id="layerHyper" onclick="toggleLayer('hyper')">⚠️ <span id="cHyper">0</span></button>
  <button class="layer-btn active swarm" id="layerSwarm" onclick="toggleLayer('swarm')">🍯 <span id="cSwarm">0</span></button>
</div>

<!-- Stats overlay -->
<div class="stats-overlay" id="gpsStats">Locating...</div>

<!-- Bottom action bar -->
<div class="bottom-bar">
  <button class="action-btn" onclick="centerOnMe()">
    <span class="icon">🎯</span>
    <span class="lbl">Center</span>
  </button>
  <button class="action-btn primary" onclick="openSwarmDialog()">
    <span class="icon">🍯</span>
    <span class="lbl">Log Swarm</span>
  </button>
  <button class="action-btn" onclick="toggleFollow()">
    <span class="icon" id="followIcon">📍</span>
    <span class="lbl" id="followLabel">Follow</span>
  </button>
</div>

<!-- Swarm dialog -->
<div class="dialog-bg" id="swarmDialog">
  <div class="dialog">
    <div class="dialog-title">🍯 Log Swarm</div>
    <div class="dialog-sub">Record a honey bee swarm found in the field</div>

    <div class="form-group">
      <label>Location Source</label>
      <div class="location-source">
        <button class="source-btn active" id="srcGPS" onclick="setLocSource('gps')">📍 My Location</button>
        <button class="source-btn" id="srcManual" onclick="setLocSource('manual')">✍️ Type Address</button>
      </div>
      <div class="coords-display" id="swarmCoords">No location set</div>
      <input type="text" id="swarmAddress" placeholder="123 Main St, Harrisburg PA" class="hidden">
    </div>

    <div class="form-group">
      <label>Status</label>
      <select id="swarmStatus">
        <option value="Active">🟢 Active — Still there</option>
        <option value="Retrieved">✅ Retrieved — Captured/relocated</option>
        <option value="Gone">⚪ Gone — No longer present</option>
      </select>
    </div>

    <div class="form-group">
      <label>Notes</label>
      <textarea id="swarmNotes" placeholder="Size, location specifics (tree branch, fence post), customer name, etc."></textarea>
    </div>

    <div class="dialog-actions">
      <button class="btn-cancel" onclick="closeSwarmDialog()">Cancel</button>
      <button class="btn-save" onclick="saveSwarm()" id="saveSwarmBtn">Save Swarm</button>
    </div>
  </div>
</div>

<div class="toast" id="toast">✓ Done</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyCtBCUuQAHuQ1O8V2sXoFYBcfaL_samV4o",
  authDomain: "lpp-search.firebaseapp.com",
  projectId: "lpp-search",
  storageBucket: "lpp-search.firebasestorage.app",
  messagingSenderId: "566058509628",
  appId: "1:566058509628:web:beaf2b918377be9c152a39"
};

const SHEETS_API = "https://script.google.com/macros/s/AKfycbyeR2077xnXKZxXIs9Ci4mJh68Qh1K4WL4YHLyun6ubhnxda10J5Pu1VFsqsmZVbhA0/exec";

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

let currentUser = null;
let map = null;
let userMarker = null;
let userLat = null;
let userLng = null;
let userAccuracy = null;
let watchId = null;
let following = true;
let layers = { apiary: null, hyper: null, swarm: null };
let visible = { apiary: true, hyper: true, swarm: true };
let registry = [];
let swarms = [];
let locSource = 'gps';
let dialogLat = null;
let dialogLng = null;
let dialogAddress = '';

// ── Init ────────────────────────────────────────────────
onAuthStateChanged(auth, async (user) => {
  if (!user) { window.location.href = 'index.html'; return; }
  currentUser = user;
  await loadData();
  initMap();
  startLocationTracking();
});

async function loadData() {
  try {
    // Try cache first
    const cachedReg = localStorage.getItem('lpp_registry_v2');
    if (cachedReg) registry = JSON.parse(cachedReg);
    const cachedSw = localStorage.getItem('lpp_swarms');
    if (cachedSw) swarms = JSON.parse(cachedSw);

    // Refresh from server
    const res = await fetch(SHEETS_API + '?action=getAll');
    const data = await res.json();
    if (data.registry) {
      registry = data.registry;
      localStorage.setItem('lpp_registry_v2', JSON.stringify(registry));
      localStorage.setItem('lpp_registry_v2_time', Date.now().toString());
    }
    if (data.swarms) {
      swarms = data.swarms;
      localStorage.setItem('lpp_swarms', JSON.stringify(swarms));
    }
  } catch(e) {
    console.error('Load failed:', e);
  }
}

function initMap() {
  document.getElementById('loadingOverlay').classList.add('hidden');
  // Center on Harrisburg area by default
  map = L.map('map', { zoomControl: true, attributionControl: false }).setView([40.27, -76.88], 12);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { maxZoom: 19 }).addTo(map);
  L.control.attribution({ position: 'bottomright', prefix: false }).addAttribution('© OpenStreetMap').addTo(map);
  renderAllLayers();
  
  // Stop following when user pans manually
  map.on('dragstart', () => { if (following) toggleFollow(); });
}

function renderAllLayers() {
  // Clear existing
  Object.values(layers).forEach(l => { if (l) map.removeLayer(l); });
  layers = { apiary: L.layerGroup(), hyper: L.layerGroup(), swarm: L.layerGroup() };

  let countA = 0, countH = 0, countS = 0;

  for (const r of registry) {
    if (!r.lat || !r.lng) continue;
    const layer = r.type === 'Apiary' ? 'apiary' : 'hyper';
    if (layer === 'apiary') countA++; else countH++;
    const marker = makeMarker(r.lat, r.lng, layer, r);
    layers[layer].addLayer(marker);
  }

  for (const s of swarms) {
    if (!s.lat || !s.lng) continue;
    countS++;
    const marker = makeMarker(s.lat, s.lng, 'swarm', s);
    layers.swarm.addLayer(marker);
  }

  document.getElementById('cApiary').textContent = countA;
  document.getElementById('cHyper').textContent  = countH;
  document.getElementById('cSwarm').textContent  = countS;

  // Add visible layers to map
  for (const key of ['apiary','hyper','swarm']) {
    if (visible[key]) layers[key].addTo(map);
  }
}

function makeMarker(lat, lng, type, data) {
  const colors = { apiary: '#e8a020', hyper: '#c0392b', swarm: '#7ec850' };
  const icons  = { apiary: '🐝', hyper: '!', swarm: '🍯' };
  const icon = L.divIcon({
    className: 'custom-pin',
    html: `<div style="background:${colors[type]};width:26px;height:26px;border-radius:50%;border:3px solid #fff;box-shadow:0 2px 8px rgba(0,0,0,0.6);display:flex;align-items:center;justify-content:center;font-size:12px;color:#fff;font-weight:700">${icons[type]}</div>`,
    iconSize: [26, 26], iconAnchor: [13, 13]
  });
  const marker = L.marker([lat, lng], { icon });
  marker.bindPopup(buildPopup(type, data));
  return marker;
}

function buildPopup(type, d) {
  if (type === 'swarm') {
    const date = d.date ? new Date(d.date).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'}) : 'Unknown';
    const statusColor = d.status === 'Active' ? '#7ec850' : d.status === 'Retrieved' ? '#3a8dde' : 'rgba(245,240,232,0.5)';
    
    // Find nearby apiaries (likely source)
    const nearby = registry.filter(r => 
      r.type === 'Apiary' && r.lat && r.lng &&
      distanceFeet(d.lat, d.lng, r.lat, r.lng) <= 10560 // 2 miles
    ).map(r => ({...r, dist: Math.round(distanceFeet(d.lat, d.lng, r.lat, r.lng))}))
    .sort((a,b) => a.dist - b.dist).slice(0, 3);
    
    let sourcesHtml = '';
    if (nearby.length > 0) {
      sourcesHtml = '<div style="margin-top:8px;padding-top:8px;border-top:1px solid rgba(126,200,80,0.2)"><div style="font-size:10px;color:var(--lime);font-weight:700;letter-spacing:0.5px;text-transform:uppercase;margin-bottom:4px">Likely Sources</div>';
      for (const r of nearby) {
        const milesAway = (r.dist/5280).toFixed(2);
        const phone = r.phoneDay ? `<br><a href="tel:${r.phoneDay.replace(/[^0-9]/g,'')}" style="color:#7ec850">${r.phoneDay}</a>` : '';
        sourcesHtml += `<div style="font-size:11px;margin:3px 0;color:rgba(245,240,232,0.85)">📍 ${escapeHtml(r.name)} <span style="color:rgba(245,240,232,0.5)">(${milesAway} mi)</span>${phone}</div>`;
      }
      sourcesHtml += '</div>';
    }
    
    return `<b>🍯 Swarm</b><br>
      📅 ${date}<br>
      📍 ${escapeHtml(d.address || 'GPS only')}<br>
      <span style="color:${statusColor}">● ${d.status}</span>
      ${d.notes ? `<br><i style="color:rgba(245,240,232,0.7);font-size:12px">"${escapeHtml(d.notes)}"</i>` : ''}
      <br><span style="font-size:10px;color:rgba(245,240,232,0.4)">Logged by ${escapeHtml(d.loggedBy)}</span>
      ${sourcesHtml}`;
  }
  
  const phones = [d.phoneDay, d.phoneNight, d.phoneAlt].filter(p => p);
  const phoneHtml = phones.map(p => `<a href="tel:${p.replace(/[^0-9]/g,'')}" style="color:#7ec850">${p}</a>`).join(' · ');
  
  const editLink = (d.tab && d.row)
    ? `<br><a href="edit.html" style="display:inline-block;margin-top:6px;font-size:11px;color:#5ba8e8;text-decoration:none;padding:3px 8px;border:1px solid rgba(58,141,222,0.3);border-radius:6px">✏️ Fix Location</a>`
    : '';
  
  return `<b>${type === 'hyper' ? '⚠️ HYPER' : '🐝 Apiary'}</b><br>
    <b style="font-size:14px">${escapeHtml(d.name)}</b><br>
    📍 ${escapeHtml(d.address)}<br>
    ${phoneHtml ? `📞 ${phoneHtml}<br>` : ''}
    ${d.email ? `✉️ <a href="mailto:${d.email}" style="color:#7ec850">${escapeHtml(d.email)}</a><br>` : ''}
    <span style="font-size:11px;color:rgba(245,240,232,0.5)">${escapeHtml(d.township)}</span>${editLink}`;
}

// ── Location tracking ──────────────────────────────────
function startLocationTracking() {
  if (!navigator.geolocation) {
    document.getElementById('gpsStats').innerHTML = '<span class="error">GPS not supported</span>';
    return;
  }
  
  watchId = navigator.geolocation.watchPosition(
    (pos) => {
      userLat = pos.coords.latitude;
      userLng = pos.coords.longitude;
      userAccuracy = Math.round(pos.coords.accuracy);
      updateUserMarker();
      updateGpsStats();
      if (following) centerOnMe();
    },
    (err) => {
      document.getElementById('gpsStats').innerHTML = `<span class="error">GPS: ${err.message}</span>`;
    },
    { enableHighAccuracy: true, maximumAge: 5000, timeout: 30000 }
  );
}

function updateUserMarker() {
  if (userMarker) map.removeLayer(userMarker);
  const icon = L.divIcon({
    className: 'user-marker',
    html: '<div class="user-dot"></div>',
    iconSize: [22, 22], iconAnchor: [11, 11]
  });
  userMarker = L.marker([userLat, userLng], { icon, zIndexOffset: 1000 }).addTo(map);
  userMarker.bindPopup(`<b>📍 Your Location</b><br>${userLat.toFixed(6)}, ${userLng.toFixed(6)}<br>±${userAccuracy}ft accuracy`);
}

function updateGpsStats() {
  const accClass = userAccuracy < 50 ? 'accuracy' : userAccuracy < 200 ? 'stale' : 'error';
  document.getElementById('gpsStats').innerHTML = 
    `📍 <span class="${accClass}">±${userAccuracy}ft</span><br>${userLat.toFixed(5)}, ${userLng.toFixed(5)}`;
}

window.centerOnMe = function() {
  if (userLat && userLng) {
    map.setView([userLat, userLng], Math.max(map.getZoom(), 16));
    if (!following) toggleFollow();
  } else {
    showToast('Still locating...');
  }
};

window.toggleFollow = function() {
  following = !following;
  document.getElementById('followIcon').textContent = following ? '📍' : '📌';
  document.getElementById('followLabel').textContent = following ? 'Following' : 'Follow';
  if (following && userLat) centerOnMe();
};

// ── Layer toggles ──────────────────────────────────────
window.toggleLayer = function(key) {
  visible[key] = !visible[key];
  const btn = document.getElementById('layer' + key.charAt(0).toUpperCase()+key.slice(1));
  btn.classList.toggle('active', visible[key]);
  if (visible[key]) layers[key].addTo(map);
  else map.removeLayer(layers[key]);
};

// ── Swarm dialog ───────────────────────────────────────
window.openSwarmDialog = function() {
  document.getElementById('swarmDialog').classList.add('show');
  setLocSource('gps');
  document.getElementById('swarmNotes').value = '';
  document.getElementById('swarmStatus').value = 'Active';
  document.getElementById('swarmAddress').value = '';
};

window.closeSwarmDialog = function() {
  document.getElementById('swarmDialog').classList.remove('show');
};

window.setLocSource = function(src) {
  locSource = src;
  document.getElementById('srcGPS').classList.toggle('active', src === 'gps');
  document.getElementById('srcManual').classList.toggle('active', src === 'manual');
  document.getElementById('swarmAddress').classList.toggle('hidden', src !== 'manual');
  
  if (src === 'gps') {
    if (userLat) {
      dialogLat = userLat;
      dialogLng = userLng;
      dialogAddress = `GPS: ${userLat.toFixed(6)}, ${userLng.toFixed(6)}`;
      document.getElementById('swarmCoords').textContent = dialogAddress;
    } else {
      document.getElementById('swarmCoords').textContent = 'Waiting for GPS...';
    }
  } else {
    document.getElementById('swarmCoords').textContent = 'Type address below';
    dialogLat = null;
    dialogLng = null;
  }
};

window.saveSwarm = async function() {
  const btn = document.getElementById('saveSwarmBtn');
  const status = document.getElementById('swarmStatus').value;
  const notes = document.getElementById('swarmNotes').value.trim();
  const manualAddr = document.getElementById('swarmAddress').value.trim();
  
  let lat = dialogLat, lng = dialogLng, addr = dialogAddress;
  
  if (locSource === 'manual') {
    if (!manualAddr) { alert('Please enter an address'); return; }
    btn.disabled = true;
    btn.innerHTML = '<span class="btn-spinner"></span>Geocoding...';
    try {
      const url = 'https://nominatim.openstreetmap.org/search?format=json&q=' + encodeURIComponent(manualAddr) + '&limit=1&countrycodes=us';
      const res = await fetch(url);
      const results = await res.json();
      if (!results || results.length === 0) {
        btn.disabled = false; btn.innerHTML = 'Save Swarm';
        alert('Address not found. Try a more specific address or use GPS.');
        return;
      }
      lat = parseFloat(results[0].lat);
      lng = parseFloat(results[0].lon);
      addr = manualAddr;
    } catch(e) {
      btn.disabled = false; btn.innerHTML = 'Save Swarm';
      alert('Geocoding failed: ' + e.message);
      return;
    }
  }
  
  if (!lat || !lng) { alert('No location set'); return; }
  
  btn.disabled = true;
  btn.innerHTML = '<span class="btn-spinner"></span>Saving...';
  
  const localUser = JSON.parse(localStorage.getItem('lpp_user') || '{}');
  
  // Find likely sources
  const nearby = registry.filter(r => 
    r.type === 'Apiary' && r.lat && r.lng &&
    distanceFeet(lat, lng, r.lat, r.lng) <= 10560
  ).map(r => r.name).slice(0, 5);
  
  try {
    await fetch(SHEETS_API, {
      method: 'POST',
      mode: 'no-cors',
      body: JSON.stringify({
        action: 'addSwarm',
        date: new Date().toISOString(),
        address: addr,
        lat: lat, lng: lng,
        status: status,
        notes: notes,
        loggedBy: localUser.name || currentUser.email,
        loggedByEmail: currentUser.email,
        likelySource: nearby.join('; ')
      })
    });
    
    // Add to local list immediately (no-cors means we don't get response)
    swarms.unshift({
      date: new Date().toISOString(),
      address: addr, lat: lat, lng: lng, status: status, notes: notes,
      loggedBy: localUser.name || currentUser.email,
      loggedByEmail: currentUser.email,
      likelySource: nearby.join('; ')
    });
    localStorage.setItem('lpp_swarms', JSON.stringify(swarms));
    renderAllLayers();
    
    closeSwarmDialog();
    showToast('✓ Swarm logged');
  } catch(e) {
    alert('Failed to save: ' + e.message);
  } finally {
    btn.disabled = false;
    btn.innerHTML = 'Save Swarm';
  }
};

// ── Helpers ────────────────────────────────────────────
function distanceFeet(lat1, lng1, lat2, lng2) {
  const R = 20902231;
  const toRad = (d) => d * Math.PI / 180;
  const dLat = toRad(lat2 - lat1);
  const dLng = toRad(lng2 - lng1);
  const a = Math.sin(dLat/2)**2 + Math.cos(toRad(lat1)) * Math.cos(toRad(lat2)) * Math.sin(dLng/2)**2;
  return 2 * R * Math.asin(Math.sqrt(a));
}

function escapeHtml(s) {
  if (!s) return '';
  return String(s).replace(/[<>&"']/g, c => ({'<':'&lt;','>':'&gt;','&':'&amp;','"':'&quot;',"'":'&apos;'}[c]));
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2200);
}
</script>
